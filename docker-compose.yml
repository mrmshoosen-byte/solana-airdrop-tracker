version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: airdrop-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airdrop_tracker
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airdrop-network

networks:
  airdrop-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
